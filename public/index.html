<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Könyv/Film Koktél</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', serif;
      background: #0f0e0c;
      color: #e8e0d0;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
    }

    header h1 {
      font-size: 2.4rem;
      font-weight: normal;
      letter-spacing: 0.05em;
      color: #f0e6c8;
    }

    header p {
      margin-top: 0.75rem;
      color: #8a7e6a;
      font-style: italic;
      font-size: 1rem;
    }

    .section-title {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #6b5e47;
      margin-bottom: 1.25rem;
    }

    /* Favorites input */
    .favorites-section {
      margin-bottom: 2rem;
    }

    .favorite-card {
      background: #1a1815;
      border: 1px solid #2e2a23;
      border-radius: 8px;
      padding: 1.25rem;
      margin-bottom: 0.75rem;
      position: relative;
    }

    .favorite-card .row {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
      align-items: center;
    }

    .favorite-card input[type="text"] {
      flex: 1;
      background: #0f0e0c;
      border: 1px solid #2e2a23;
      border-radius: 5px;
      color: #e8e0d0;
      font-family: inherit;
      font-size: 0.95rem;
      padding: 0.6rem 0.85rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .favorite-card input[type="text"]:focus {
      border-color: #8b6f47;
    }

    .favorite-card input[type="text"]::placeholder {
      color: #4a4035;
    }

    .type-toggle {
      display: flex;
      background: #0f0e0c;
      border: 1px solid #2e2a23;
      border-radius: 5px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .type-toggle button {
      background: none;
      border: none;
      color: #6b5e47;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.8rem;
      padding: 0.6rem 0.9rem;
      transition: background 0.15s, color 0.15s;
    }

    .type-toggle button.active {
      background: #2e2520;
      color: #d4a96a;
    }

    .favorite-card textarea {
      width: 100%;
      background: #0f0e0c;
      border: 1px solid #2e2a23;
      border-radius: 5px;
      color: #e8e0d0;
      font-family: inherit;
      font-size: 0.9rem;
      padding: 0.6rem 0.85rem;
      resize: vertical;
      min-height: 72px;
      outline: none;
      transition: border-color 0.2s;
      line-height: 1.5;
    }

    .favorite-card textarea:focus {
      border-color: #8b6f47;
    }

    .favorite-card textarea::placeholder {
      color: #4a4035;
    }

    .remove-btn {
      position: absolute;
      top: 0.75rem;
      right: 0.75rem;
      background: none;
      border: none;
      color: #4a4035;
      cursor: pointer;
      font-size: 1.1rem;
      line-height: 1;
      padding: 0.1rem 0.3rem;
      transition: color 0.15s;
    }

    .remove-btn:hover { color: #a06050; }

    .add-btn {
      background: none;
      border: 1px dashed #2e2a23;
      border-radius: 8px;
      color: #6b5e47;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.9rem;
      padding: 0.85rem;
      text-align: center;
      width: 100%;
      transition: border-color 0.2s, color 0.2s;
    }

    .add-btn:hover {
      border-color: #8b6f47;
      color: #c4956a;
    }

    /* Submit */
    .submit-btn {
      background: #8b6f47;
      border: none;
      border-radius: 8px;
      color: #f0e6c8;
      cursor: pointer;
      font-family: 'Georgia', serif;
      font-size: 1rem;
      letter-spacing: 0.05em;
      padding: 0.9rem 2rem;
      width: 100%;
      margin-bottom: 3rem;
      transition: background 0.2s;
    }

    .submit-btn:hover { background: #a07f57; }
    .submit-btn:disabled { background: #3a3028; color: #5a4e3c; cursor: not-allowed; }

    /* Loading */
    .loading {
      display: none;
      text-align: center;
      padding: 2rem;
      color: #8a7e6a;
      font-style: italic;
    }

    .loading.visible { display: block; }

    .dots::after {
      content: '';
      animation: dots 1.4s steps(4, end) infinite;
    }

    @keyframes dots {
      0%, 20% { content: ''; }
      40% { content: '.'; }
      60% { content: '..'; }
      80%, 100% { content: '...'; }
    }

    /* Results */
    .results { display: none; }
    .results.visible { display: block; }

    .taste-profile {
      background: #1a1815;
      border-left: 3px solid #8b6f47;
      border-radius: 0 8px 8px 0;
      padding: 1.25rem 1.5rem;
      margin-bottom: 2rem;
      font-style: italic;
      color: #c4b89a;
      line-height: 1.7;
    }

    .recommendations-grid {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .rec-card {
      background: #1a1815;
      border: 1px solid #2e2a23;
      border-radius: 8px;
      padding: 1.5rem;
      transition: border-color 0.2s;
    }

    .rec-card:hover { border-color: #4a3e2a; }

    .rec-header {
      display: flex;
      align-items: baseline;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
      flex-wrap: wrap;
    }

    .rec-title {
      font-size: 1.15rem;
      color: #f0e6c8;
    }

    .rec-meta {
      font-size: 0.8rem;
      color: #6b5e47;
    }

    .rec-badge {
      background: #2e2520;
      border-radius: 4px;
      color: #d4a96a;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      padding: 0.2rem 0.5rem;
      text-transform: uppercase;
    }

    .rec-reason {
      color: #a09280;
      font-size: 0.92rem;
      line-height: 1.7;
    }

    .error-msg {
      background: #2a1515;
      border: 1px solid #5a2020;
      border-radius: 8px;
      color: #d08080;
      display: none;
      padding: 1rem 1.25rem;
      margin-bottom: 1.5rem;
    }

    .error-msg.visible { display: block; }

    .restart-btn {
      background: none;
      border: 1px solid #2e2a23;
      border-radius: 8px;
      color: #6b5e47;
      cursor: pointer;
      font-family: 'Georgia', serif;
      font-size: 0.9rem;
      margin-top: 2rem;
      padding: 0.7rem 1.5rem;
      transition: border-color 0.2s, color 0.2s;
    }

    .restart-btn:hover { border-color: #8b6f47; color: #c4956a; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Könyv/Film Koktél</h1>
      <p>Mondd el, mit szerettél — felfedjük, miért, és mit keress ezután.</p>
    </header>

    <div id="inputSection">
      <div class="favorites-section">
        <p class="section-title">Kedvenceid</p>
        <div id="favoritesList"></div>
        <button class="add-btn" id="addBtn">+ Újabb kedvenc hozzáadása</button>
      </div>

      <div class="error-msg" id="errorMsg"></div>

      <button class="submit-btn" id="submitBtn">Készítsd el az ajánlómat →</button>
    </div>

    <div class="loading" id="loading">
      <span class="dots">Elemzem az ízlésedet</span>
    </div>

    <div class="results" id="results">
      <p class="section-title">Az ízlésed mintázata</p>
      <div class="taste-profile" id="tasteProfile"></div>

      <p class="section-title">Ajánlásaid</p>
      <div class="recommendations-grid" id="recsGrid"></div>

      <button class="restart-btn" id="restartBtn">← Új keresés</button>
    </div>
  </div>

  <script>
    let cardCount = 0;

    function createCard(index) {
      const card = document.createElement('div');
      card.className = 'favorite-card';
      card.dataset.index = index;
      card.innerHTML = `
        <button class="remove-btn" onclick="removeCard(this)" title="Törlés">×</button>
        <div class="row">
          <input type="text" placeholder="Cím (pl. Tóth Erzsébet / Parasite)" class="title-input">
          <div class="type-toggle">
            <button class="active" data-type="book" onclick="setType(this, 'book')">📖 Könyv</button>
            <button data-type="film" onclick="setType(this, 'film')">🎬 Film</button>
          </div>
        </div>
        <textarea placeholder="Miért szeretted? Milyen érzés volt? Mi maradt meg belőle? (Minél őszintébb vagy, annál jobb lesz az ajánlás.)"></textarea>
      `;
      return card;
    }

    function setType(btn, type) {
      const toggle = btn.closest('.type-toggle');
      toggle.querySelectorAll('button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    function removeCard(btn) {
      const list = document.getElementById('favoritesList');
      if (list.children.length <= 1) return;
      btn.closest('.favorite-card').remove();
    }

    document.getElementById('addBtn').addEventListener('click', () => {
      const list = document.getElementById('favoritesList');
      list.appendChild(createCard(++cardCount));
    });

    document.getElementById('restartBtn').addEventListener('click', () => {
      document.getElementById('results').classList.remove('visible');
      document.getElementById('inputSection').style.display = '';
      document.getElementById('recsGrid').innerHTML = '';
      document.getElementById('tasteProfile').textContent = '';
    });

    document.getElementById('submitBtn').addEventListener('click', async () => {
      const cards = document.querySelectorAll('.favorite-card');
      const favorites = [];
      let valid = true;

      cards.forEach(card => {
        const title = card.querySelector('.title-input').value.trim();
        const why = card.querySelector('textarea').value.trim();
        const activeType = card.querySelector('.type-toggle .active');
        const type = activeType ? activeType.dataset.type : 'book';

        if (title && why) {
          favorites.push({ title, type, why });
        } else if (title || why) {
          valid = false;
        }
      });

      const errorEl = document.getElementById('errorMsg');

      if (favorites.length === 0) {
        errorEl.textContent = 'Adj meg legalább egy kedvencet (cím + miért szeretted).';
        errorEl.classList.add('visible');
        return;
      }

      if (!valid) {
        errorEl.textContent = 'Minden megkezdett kártyánál töltsd ki a cimet és az indoklást is.';
        errorEl.classList.add('visible');
        return;
      }

      errorEl.classList.remove('visible');
      document.getElementById('inputSection').style.display = 'none';
      document.getElementById('loading').classList.add('visible');

      try {
        const res = await fetch('/recommend', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ favorites }),
        });

        const data = await res.json();

        if (!res.ok) throw new Error(data.error || 'Ismeretlen hiba');

        document.getElementById('loading').classList.remove('visible');
        document.getElementById('tasteProfile').textContent = data.taste_profile;

        const grid = document.getElementById('recsGrid');
        grid.innerHTML = '';
        data.recommendations.forEach(rec => {
          const card = document.createElement('div');
          card.className = 'rec-card';
          card.innerHTML = `
            <div class="rec-header">
              <span class="rec-title">${esc(rec.title)}</span>
              <span class="rec-badge">${rec.type === 'book' ? 'Könyv' : 'Film'}</span>
              <span class="rec-meta">${esc(rec.creator)}${rec.year ? ', ' + rec.year : ''}</span>
            </div>
            <p class="rec-reason">${esc(rec.reason)}</p>
          `;
          grid.appendChild(card);
        });

        document.getElementById('results').classList.add('visible');
      } catch (err) {
        document.getElementById('loading').classList.remove('visible');
        document.getElementById('inputSection').style.display = '';
        errorEl.textContent = 'Hiba: ' + err.message;
        errorEl.classList.add('visible');
      }
    });

    function esc(str) {
      return String(str ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // Induláskor egy kártya
    document.getElementById('favoritesList').appendChild(createCard(++cardCount));
    document.getElementById('favoritesList').appendChild(createCard(++cardCount));
  </script>
</body>
</html>
